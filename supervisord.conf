[supervisord]
nodaemon=true
user=root
logfile=/app/logs/supervisord.log
pidfile=/var/run/supervisord.pid

[program:nestjs]
command=node /app/backend/dist/main.js
autostart=true
autorestart=true
priority=10
stdout_logfile=/app/logs/nestjs.log
stderr_logfile=/app/logs/nestjs.log
environment=PORT="3000",DATABASE_PATH="/app/data/info-collection.db",JWT_SECRET="change-me-in-production",PYTHON_SERVICE_URL="http://localhost:8000"

[program:python]
command=python3.11 -m uvicorn ai-service.main:app --host 0.0.0.0 --port 8000 --workers 1
autostart=true
autorestart=true
priority=20
stdout_logfile=/app/logs/python.log
stderr_logfile=/app/logs/python.log
